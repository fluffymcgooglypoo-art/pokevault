kind = "web"
previewPath = "/"
title = "PokeVault"
version = "1.0.0"
id = "artifacts/pokevault"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18666

[services.development]
run = "pnpm --filter @workspace/pokevault run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pokevault", "run", "build" ]
publicDir = "artifacts/pokevault/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18666"
BASE_PATH = "/"
